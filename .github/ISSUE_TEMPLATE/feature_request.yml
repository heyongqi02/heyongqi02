name: 🚀 功能建议
description: 提议新功能或改进现有能力
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        **开始之前**

        感谢你愿意花时间提出建议。请先：
        - 阅读 [README](/README.md) 与 [贡献指南](/CONTRIBUTING.md)，确认当前是否已支持或已有替代方案
        - 搜索是否已有类似 Issue，避免重复

        若你**打算提交 PR** 实现该功能，请在下方说明；较大改动建议先与维护者对齐方向（见贡献指南）。

        > [!WARNING]
        > **安全提示**：若你发现的是可被利用的安全漏洞，**请勿**在此提交公开 Issue，请按 [安全策略](/SECURITY.md) 通过私密渠道报告。

  - type: textarea
    id: problem
    attributes:
      label: 背景与动机
      description: 你遇到了什么问题，或希望达成什么目标？可用用户故事描述（「作为…我希望…以便…」）。
      placeholder: |
        作为 xxx 的使用者，我希望能够 xxx，以便 xxx。
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: 期望方案
      description: 你理想中的实现方式、API 形态或交互流程（不必非常具体）。
      placeholder: |
        例如：新增 `xxx foo` 子命令，支持 `--bar` 选项，默认行为为…
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 已考虑的替代方案
      description: 其他可行做法、现有工具或 workaround，以及你不选择它们的理由（如有）。

  - type: textarea
    id: acceptance
    attributes:
      label: 验收标准（可选）
      description: 怎样算「做完了」？列出 1～3 条可验证的结果即可。
      placeholder: |
        - [ ] 支持 xxx 场景
        - [ ] 文档/README 已更新
        - [ ] 与现有行为兼容

  - type: textarea
    id: additional
    attributes:
      label: 补充说明
      description: 截图、相关链接、版本号、使用场景等任何有助于理解的信息。

  - type: checkboxes
    id: validations
    attributes:
      label: 提交前确认
      options:
        - label: 我已阅读 [行为准则](/CODE_OF_CONDUCT.md) 与 [贡献指南](/CONTRIBUTING.md)
          required: true
        - label: 我已搜索现有 Issue，确认没有重复的功能请求
          required: true
